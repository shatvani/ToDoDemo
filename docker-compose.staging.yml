services:

  db:
    image: postgres:16-alpine
    container_name: todo-db-staging
    environment:
      POSTGRES_DB: tododb
      POSTGRES_USER: todo
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - todo-db-staging-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todo -d tododb"]
      interval: 5s
      timeout: 5s
      retries: 5
    # Staging-ben az adatbázis nincs kívülre nyitva
    expose:
      - "5432"

  api:
    image: ghcr.io/${GITHUB_REPOSITORY}/todo-ai-demo:${IMAGE_TAG:-latest}
    container_name: todo-api-staging
    environment:
      ASPNETCORE_ENVIRONMENT: Staging
      ConnectionStrings__DefaultConnection: "Host=db;Database=tododb;Username=todo;Password=${DB_PASSWORD}"
      ApplicationInsights__ConnectionString: ${APPINSIGHTS_CONNECTION_STRING}
    expose:
      - "8080"
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: todo-nginx-staging
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

volumes:
  todo-db-staging-data:
