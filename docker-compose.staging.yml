networks:
  proxy:
    external: true

services:

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: todo-db-staging
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${DB_PASSWORD}
    volumes:
      - todo-db-staging-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q 'SELECT 1' -C -b -o /dev/null"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    expose:
      - "1433"

  api:
    image: ghcr.io/shatvani/todo-ai-demo:${IMAGE_TAG:-develop}
    container_name: todo-api-staging
    environment:
      ASPNETCORE_ENVIRONMENT: Staging
      ConnectionStrings__DefaultConnection: "Server=db;Database=tododb;User Id=todo;Password=${DB_PASSWORD};TrustServerCertificate=True"
      TodoApi__BaseUrl: "http://localhost:8080"
    expose:
      - "8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - default
      - proxy

volumes:
  todo-db-staging-data:
