name: CI

on:
  push:
    branches:
      - develop
      - 'feature/**'
      - 'chore/**'
      - 'bugfix/**'
  pull_request:
    branches:
      - main
      - develop

jobs:
  ci:
    name: CI
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: dotnet format
        run: dotnet format --verify-no-changes

      - name: Install SonarCloud scanner
        run: |
          dotnet tool update --global dotnet-sonarscanner
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: SonarCloud begin
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet sonarscanner begin \
            /k:"shatvani_ToDoDemo" \
            /o:"shatvani" \
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
            /d:sonar.cs.opencover.reportsPaths="**/coverage.opencover.xml"

      - name: dotnet build
        run: dotnet build --no-incremental -warnaserror -p:SkipTailwind=true

      - name: dotnet test
        run: dotnet test --no-build -p:SkipTailwind=true --collect:"XPlat Code Coverage" --logger "junit;LogFilePath=../../test-results.xml" -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover

      - name: SonarCloud end
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
