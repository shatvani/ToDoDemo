name: CD Staging

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy to Staging
    runs-on: self-hosted
    if: github.event.workflow_run.conclusion == 'success'

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Szemantikus verzió + Git tag
        id: tag
        run: |
          git fetch --tags
          LAST_TAG=$(git tag --sort=-v:refname | grep '^v' | head -n1)
          if [ -z "$LAST_TAG" ]; then
            NEW_TAG="v1.0.0"
          else
            VERSION=${LAST_TAG#v}
            PATCH=$(echo $VERSION | cut -d. -f3)
            NEW_PATCH=$((PATCH + 1))
            NEW_TAG="v$(echo $VERSION | cut -d. -f1).$(echo $VERSION | cut -d. -f2).$NEW_PATCH"
          fi
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          git tag $NEW_TAG
          git push origin $NEW_TAG

      - name: SSH Deploy
        env:
          SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
          DEPLOY_USER: ${{ secrets.STAGING_USER }}
          DEPLOY_HOST: ${{ secrets.STAGING_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/staging_key
          chmod 600 ~/.ssh/staging_key
          ssh -i ~/.ssh/staging_key \
            -o StrictHostKeyChecking=no \
            $DEPLOY_USER@$DEPLOY_HOST \
            "cd /opt/todo-ai-demo && \
             docker compose -f docker-compose.staging.yml pull && \
             IMAGE_TAG=main docker compose -f docker-compose.staging.yml up -d"
          rm ~/.ssh/staging_key