name: PO Task Assistant

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  po-task-assistant:
    name: PO Task Assistant
    runs-on: self-hosted

    permissions:
      models: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: .github/scripts
        run: npm ci --ignore-scripts

      - name: Run PO Task Assistant
        working-directory: .github/scripts
        run: node po-task-assistant.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OP_BASE_URL: ${{ secrets.OP_BASE_URL }}
          OP_API_TOKEN: ${{ secrets.OP_API_TOKEN }}
          OP_PROJECT_ID: ${{ secrets.OP_PROJECT_ID }}