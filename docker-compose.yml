services:

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: todo-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Todo_dev_pw1!"
      MSSQL_DB: tododb
    ports:
      - "1433:1433"
    volumes:
      - todo-db-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Todo_dev_pw1!' -Q 'SELECT 1' -No -C"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: todo-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=db;Database=tododb;User Id=sa;Password=Todo_dev_pw1!;TrustServerCertificate=True"
    ports:
      - "5000:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  todo-db-data:
